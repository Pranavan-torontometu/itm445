<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <h2>Fast Food Burger Locator</h2>
        <div class="navlinks">
            <a href="index.html">Home</a>
            <a href="results.html">Find Restaurants</a>
            <a href="build.html">Build Your Meal</a>
            <a href="quiz.html">Quiz</a>
            <a href="community.html">Community</a>
        </div>
    </div>
    <h2 class="results-title">Found 4 burger restaurants near you</h2>
    <div class="results-container fade-in">
    
        <div class="results-list">
            <div class="results-list-header">
                <h2>Results</h2>
                <div class="filter-wrapper">
                    <select id="filter-select" class="filter-dropdown" onchange="sortCards(this.value)">
                        <option value="" disabled selected>Filter</option>
                        <option value="distance">Distance</option>
                        <option value="price">Price</option>
                        <option value="rating">Rating</option>
                    </select>
                </div>
            </div>

            
            <div id="cards-container">
                <div class="result-card" data-distance="600" data-price="2" data-rating="3">
                    <img src="burger-icon.jpg" class="result-icon">
                    <div class="result-info">
                        <h4>Firefly Burger</h4>
                        <div class="stars">
                            <img src="itm445Star.png" class="star">
                            <img src="itm445Star.png" class="star">
                            <img src="itm445Star.png" class="star">
                        </div>
                        <div class="card-meta">
                            <span class="price-tag">$$</span>
                            <span class="distance-tag">600m away</span>
                        </div>
                    </div>
                </div>

                <div class="result-card" data-distance="400" data-price="1" data-rating="3">
                    <img src="burger-icon.jpg" class="result-icon">
                    <div class="result-info">
                        <h4>Bodega Burgers</h4>
                        <div class="stars">
                            <img src="itm445Star.png" class="star">
                            <img src="itm445Star.png" class="star">
                            <img src="itm445Star.png" class="star">
                        </div>
                        <div class="card-meta">
                            <span class="price-tag">$</span>
                            <span class="distance-tag">400m away</span>
                        </div>
                    </div>
                </div>

                <div class="result-card" data-distance="500" data-price="1" data-rating="4">
                    <img src="burger-icon.jpg" class="result-icon">
                    <div class="result-info">
                        <h4>Five Guys</h4>
                        <div class="stars">
                            <img src="itm445Star.png" class="star">
                            <img src="itm445Star.png" class="star">
                            <img src="itm445Star.png" class="star">
                            <img src="itm445Star.png" class="star">
                        </div>
                        <div class="card-meta">
                            <span class="price-tag">$</span>
                            <span class="distance-tag">500m away</span>
                        </div>
                    </div>
                </div>

                <div class="result-card" data-distance="800" data-price="2" data-rating="5">
                    <img src="burger-icon.jpg" class="result-icon">
                    <div class="result-info">
                        <h4>Jack's</h4>
                        <div class="stars">
                            <img src="itm445Star.png" class="star">
                            <img src="itm445Star.png" class="star">
                            <img src="itm445Star.png" class="star">
                            <img src="itm445Star.png" class="star">
                            <img src="itm445Star.png" class="star">
                        </div>
                        <div class="card-meta">
                            <span class="price-tag">$$</span>
                            <span class="distance-tag">800m away</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="map">
            <img src="map.jpg">
        </div>
    </div>

    <script>
        function sortCards(filter) {
            const container = document.getElementById('cards-container');
            const cards = Array.from(container.querySelectorAll('.result-card'));

            cards.sort((a, b) => {
                if (filter === 'distance') {
                    return parseInt(a.dataset.distance) - parseInt(b.dataset.distance);
                } else if (filter === 'price') {
                    return parseInt(a.dataset.price) - parseInt(b.dataset.price);
                } else if (filter === 'rating') {
                    return parseInt(b.dataset.rating) - parseInt(a.dataset.rating); // highest first
                }
                return 0;
            });

            // Re-append in sorted order
            cards.forEach(card => container.appendChild(card));
        }
    </script>
</body>
</html>
