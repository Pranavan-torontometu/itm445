<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community - Burger Locator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
    <header class="navbar">
        <h2 class="logo">Burger Locator</h2>
        <nav>
            <a href="index.html">Home</a>
            <a href="community.html">Community</a>
            <a href="build.html">Build</a>
        </nav>
    </header>

    <!-- HEADER -->
    <section class="page-header">
        <h1>Community Favorites 🍔</h1>
        <p>See what other users are enjoying</p>
    </section>

    <!-- BURGER CARDS -->
    <section class="card-container">

        <div class="card">
            <img src="burger1.jpg" alt="Classic Burger">
            <h3>Classic Cheeseburger</h3>
            <p class="rating">⭐ 4.5</p>
            <p>"Simple, juicy, and perfect."</p>
        </div>

        <div class="card">
            <img src="burger2.jpg" alt="BBQ Burger">
            <h3>Double BBQ Burger</h3>
            <p class="rating">⭐ 4.8</p>
            <p>"Packed with flavor and very filling."</p>
        </div>

        <div class="card">
            <img src="burger3.jpg" alt="Spicy Burger">
            <h3>Spicy Chicken Burger</h3>
            <p class="rating">⭐ 4.3</p>
            <p>"Crispy with a nice kick."</p>
        </div>

    </section>

</body>
</html>
