<!-- COMMUNITY PAGE -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Reviews - Fast Food Burger Locator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<a class="skip-link" href="#main-content">Skip to main content</a>

<nav class="navbar" aria-label="Main navigation">
    <h2>Fast Food Burger Locator</h2>
    <div class="navlinks">
        <a href="index.html">Home</a>
        <a href="results.html">Find Restaurants</a>
        <a href="build.html">Build Your Meal</a>
        <a href="quiz.html">Quiz</a>
        <a href="community.html" class="active" aria-current="page">Community</a>
    </div>
</nav>

<main id="main-content">
    <header>
        <h1>Community Reviews 🍔</h1>
        <p>See what other burger lovers are saying</p>
    </header>

    <!-- STATUS MESSAGE -->
    <p id="status-message" aria-live="polite"></p>

    <!-- ADD REVIEW FORM -->
    <section aria-labelledby="add-review-heading">
        <h2 id="add-review-heading">Add Your Review</h2>

        <form onsubmit="event.preventDefault(); postReview();">
            
            <label for="review-restaurant">Restaurant</label>
            <select id="review-restaurant" required>
                <option value="">Select a restaurant</option>
                <option>Jack's Sankofa Square</option>
                <option>Five Guys</option>
                <option>Firefly Burger</option>
                <option>Bodega Burgers</option>
            </select>

            <label for="review-username">Username</label>
            <input type="text" id="review-username" required>

            <fieldset>
                <legend>Rating</legend>

                <button type="button" onclick="setRating(1)">1</button>
                <button type="button" onclick="setRating(2)">2</button>
                <button type="button" onclick="setRating(3)">3</button>
                <button type="button" onclick="setRating(4)">4</button>
                <button type="button" onclick="setRating(5)">5</button>
            </fieldset>

            <label for="review-text">Review</label>
            <textarea id="review-text" required></textarea>

            <button type="submit">Post Review</button>
        </form>
    </section>

    <!-- REVIEWS -->
    <section aria-labelledby="reviews-heading">
        <h2 id="reviews-heading">Reviews</h2>
        <div id="reviews-container"></div>
    </section>
</main>

<footer>
    <p>&copy; 2026 Fast Food Burger Locator</p>
</footer>

<script>
let currentRating = 0;

function setRating(n) {
    currentRating = n;
    document.getElementById("status-message").textContent = "Selected " + n + " star rating";
}

function postReview() {
    const restaurant = document.getElementById('review-restaurant').value;
    const username = document.getElementById('review-username').value;
    const text = document.getElementById('review-text').value;

    if (!restaurant || !username || !text || currentRating === 0) {
        document.getElementById("status-message").textContent = "Please complete all fields.";
        return;
    }

    const div = document.createElement('div');
    div.innerHTML = `
        <strong>${username}</strong> (${currentRating}/5)
        <p>${text}</p>
        <hr>
    `;

    document.getElementById('reviews-container').appendChild(div);

    document.getElementById("status-message").textContent = "Review posted successfully!";

    document.querySelector("form").reset();
    currentRating = 0;
}
</script>

</body>
</html>
