<!DOCTYPE html>
<html>
<head>
    <title>Burger Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
    <h2>Fast Food Burger Locator</h2>
    <div class="navlinks">
        <a href="index.html">Home</a>
        <a href="results.html">Find Restaurants</a>
        <a href="build.html">Build Your Meal</a>
        <a href="quiz.html">Quiz</a>
        <a href="community.html">Community</a>
    </div>
</div>

<div class="center fade-in">

    <h2>Burger Personality Quiz</h2>

    <p>1. What do you prefer?</p>
    <button onclick="answer('spicy')">Spicy 🔥</button>
    <button onclick="answer('classic')">Classic 🍔</button>

    <p>2. Pick a vibe:</p>
    <button onclick="answer('fancy')">Fancy ✨</button>
    <button onclick="answer('simple')">Simple 👍</button>

    <h3 id="result"></h3>

</div>

<script>
let score = {
    spicy: 0,
    classic: 0,
    fancy: 0,
    simple: 0
};

function answer(type) {
    score[type]++;
    showResult();
}

function showResult() {
    let result = document.getElementById("result");

    if (score.spicy > score.classic && score.spicy > score.fancy && score.spicy > score.simple) {
        result.innerText = "🔥 You are a Spicy Burger!";
    } else if (score.fancy > score.spicy && score.fancy > score.classic && score.fancy > score.simple) {
        result.innerText = "✨ You are a Gourmet Burger!";
    } else if (score.simple > score.spicy && score.simple > score.classic && score.simple > score.fancy) {
        result.innerText = "👍 You are a Simple Classic Burger!";
    } else {
        result.innerText = "🍔 You are a Classic Cheeseburger!";
    }
}
</script>

</body>
</html>
