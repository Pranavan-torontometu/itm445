<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build Your Meal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<a href="#main">Skip to main content</a>

<nav aria-label="Main navigation">
    <a href="index.html">Home</a>
    <a href="build.html" aria-current="page">Build</a>
</nav>

<main id="main">

<h1>Build Your Burger</h1>

<button onclick="select('bun','White')">White Bun</button>
<button onclick="select('bun','Brioche')">Brioche</button>

<button onclick="select('patty','Beef')">Beef</button>
<button onclick="select('patty','Chicken')">Chicken</button>

<button onclick="select('sauce','BBQ')">BBQ</button>

<p id="summary" aria-live="polite"></p>

<button onclick="buildBurger()">Build</button>

</main>

<script>
const selections = {};

function select(type, value){
    selections[type] = value;
}

function buildBurger(){
    document.getElementById("summary").textContent =
    Object.values(selections).join(", ");
}
</script>

</body>
</html>
