<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <h2>Fast Food Burger Locator</h2>
        <div class="navlinks">
            <a href="index.html">Home</a>
            <a href="results.html">Find Restaurants</a>
            <a href="build.html">Build Your Meal</a>
            <a href="quiz.html">Quiz</a>
            <a href="community.html">Community</a>
        </div>
    </div>
    <h2 class="results-title">Found 4 burger restaurants near you</h2>
    <div class="results-container fade-in">
        <!-- LEFT SIDE -->
        <div class="results-list">
            <div class="results-list-header">
                <h2>Results</h2>
                <div class="filter-wrapper">
                    <select id="filter-select" class="filter-dropdown">
                        <option value="">Filter</option>
                        <option value="distance" selected>Distance</option>
                        <option value="price">Price</option>
                        <option value="rating">Rating</option>
                    </select>
                </div>
            </div>
            <!-- CARD 1 -->
            <div class="result-card">
                <img src="burger-icon.jpg" class="result-icon">
                <div class="result-info">
                    <h4>Firefly Burger</h4>
                    <div class="stars">
                        <img src="itm445Star.png" class="star">
                        <img src="itm445Star.png" class="star">
                        <img src="itm445Star.png" class="star">
                        <img src="itm445Star.png" class="star">
                        <img src="itm445Star.png" class="star">
                    </div>
                    <p>2km away</p>
                </div>
            </div>
            <!-- CARD 2 -->
            <div class="result-card">
                <img src="burger-icon.jpg" class="result-icon">
                <div class="result-info">
                    <h4>Bodega Burgers</h4>
                    <div class="stars">
                        <img src="itm445Star.png" class="star">
                        <img src="itm445Star.png" class="star">
                        <img src="itm445Star.png" class="star">
                        <img src="itm445Star.png" class="star">
                        <img src="itm445Star.png" class="star">
                    </div>
                    <p>2km away</p>
                </div>
            </div>
            <!-- CARD 3 -->
            <div class="result-card">
                <img src="burger-icon.jpg" class="result-icon">
                <div class="result-info">
                    <h4>Five Guys</h4>
                    <div class="stars">
                        <img src="itm445Star.png" class="star">
                        <img src="itm445Star.png" class="star">
                        <img src="itm445Star.png" class="star">
                        <img src="itm445Star.png" class="star">
                        <img src="itm445Star.png" class="star">
                    </div>
                    <p>2km away</p>
                </div>
            </div>
            <!-- CARD 4 -->
            <div class="result-card">
                <img src="burger-icon.jpg" class="result-icon">
                <div class="result-info">
                    <h4>Jack's</h4>
                    <div class="stars">
                        <img src="itm445Star.png" class="star">
                        <img src="itm445Star.png" class="star">
                        <img src="itm445Star.png" class="star">
                        <img src="itm445Star.png" class="star">
                        <img src="itm445Star.png" class="star">
                    </div>
                    <p>2km away</p>
                </div>
            </div>
        </div>
        <!-- MAP -->
        <div class="map">
            <img src="map.jpg">
        </div>
    </div>
</body>
</html>
