<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build Your Burger</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
    <header class="navbar">
        <h2 class="logo">Burger Locator</h2>
        <nav>
            <a href="index.html">Home</a>
            <a href="community.html">Community</a>
            <a href="build.html">Build</a>
        </nav>
    </header>

    <div class="page-container">

        <!-- BUILD BURGER -->
        <section class="card">
            <h2>Build Your Own Burger 🍔</h2>

            <label><input type="checkbox" value="Beef"> Beef</label><br>
            <label><input type="checkbox" value="Chicken"> Chicken</label><br>
            <label><input type="checkbox" value="Cheese"> Cheese</label><br>
            <label><input type="checkbox" value="Lettuce"> Lettuce</label><br>
            <label><input type="checkbox" value="Bacon"> Bacon</label><br>

            <button onclick="buildBurger()" class="btn">Create Burger</button>

            <p id="burgerResult" class="result-text"></p>
        </section>

        <!-- QUIZ -->
        <section class="card">
            <h2>Burger Personality Quiz 🤔</h2>

            <label for="flavor">Pick a flavor:</label>
            <select id="flavor">
                <option value="spicy">Spicy</option>
                <option value="classic">Classic</option>
                <option value="bbq">BBQ</option>
            </select>

            <button onclick="getResult()" class="btn">Get Result</button>

            <p id="quizResult" class="result-text"></p>
        </section>

    </div>

    <script>
        function buildBurger() {
            let selected = [];
            let checkboxes = document.querySelectorAll("input[type=checkbox]:checked");

            checkboxes.forEach(cb => selected.push(cb.value));

            document.getElementById("burgerResult").innerText =
                "Your burger: " + selected.join(", ");
        }

        function getResult() {
            let flavor = document.getElementById("flavor").value;
            let result = "";

            if (flavor === "spicy") {
                result = "You should try a Spicy Chicken Burger!";
            } else if (flavor === "classic") {
                result = "You are a Classic Cheeseburger person!";
            } else {
                result = "BBQ Bacon Burger is perfect for you!";
            }

            document.getElementById("quizResult").innerText = result;
        }
    </script>

</body>
</html>
